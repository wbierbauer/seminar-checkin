<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Anwesenheit</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7fafc;
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.5rem;
        color: #1a202c;
        margin-bottom: 6px;
      }
      .subtitle {
        color: #718096;
        margin-bottom: 24px;
        font-size: 0.9rem;
      }
      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
        align-items: center;
      }
      select,
      button {
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        border: 1.5px solid #e2e8f0;
        cursor: pointer;
        background: white;
      }
      .btn-export {
        background: #2f855a;
        color: white;
        border-color: #2f855a;
        font-weight: 600;
      }
      .btn-export:hover {
        background: #276749;
      }
      .btn-refresh {
        background: #3182ce;
        color: white;
        border-color: #3182ce;
        font-weight: 600;
      }
      .btn-refresh:hover {
        background: #2b6cb0;
      }
      .count {
        color: #4a5568;
        font-size: 0.9rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      }
      th {
        background: #3182ce;
        color: white;
        padding: 12px 16px;
        text-align: left;
        font-size: 0.85rem;
      }
      td {
        padding: 11px 16px;
        border-bottom: 1px solid #edf2f7;
        font-size: 0.9rem;
        color: #2d3748;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #ebf8ff;
      }
      .empty {
        text-align: center;
        padding: 40px;
        color: #a0aec0;
      }
      #loginScreen {
        max-width: 360px;
        margin: 80px auto;
        background: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      }
      #loginScreen h2 {
        margin-bottom: 20px;
      }
      #loginScreen input {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 14px;
      }
      #loginScreen button {
        width: 100%;
        padding: 12px;
        background: #3182ce;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      #mainContent {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen">
      <h2>🔒 Admin-Login</h2>
      <input
        type="password"
        id="pwInput"
        placeholder="Passwort"
        onkeydown="if(event.key==='Enter') login()"
      />
      <button onclick="login()">Anmelden</button>
      <p
        id="loginError"
        style="
          color: #e53e3e;
          margin-top: 10px;
          font-size: 0.85rem;
          display: none;
        "
      >
        Falsches Passwort.
      </p>
    </div>

    <div id="mainContent">
      <h1>📊 Anwesenheitsübersicht</h1>
      <p class="subtitle">
        Gesundheitsförderung über die Lebensspanne – FS 2026
      </p>
      <div class="controls">
        <select id="filterSession" onchange="renderTable()">
          <option value="">Alle Sitzungen</option>
          <option value="1">Sitzung 1 – 16.02. – Vorstellung</option>
          <option value="2">Sitzung 2 – 23.02. – Einführung</option>
          <option value="3">Sitzung 3 – 02.03. – Tabakkonsum</option>
          <option value="4">Sitzung 4 – 09.03. – Medikamenteneinnahme</option>
          <option value="5">Sitzung 5 – 16.03. – Körperliche Aktivität</option>
          <option value="6">Sitzung 6 – 23.03. – Alkohol</option>
          <option value="7">Sitzung 7 – 30.03. – Ernährung</option>
          <option value="9">Sitzung 9 – 13.04. – Stress</option>
          <option value="11">Sitzung 11 – 27.04. – Social Media</option>
          <option value="12">Sitzung 12 – 04.05. – Schlaf</option>
          <option value="13">Sitzung 13 – 11.05. – Posterworkshop</option>
          <option value="14">Sitzung 14 – 18.05. – Poster-Kongress</option>
        </select>
        <button class="btn-refresh" onclick="loadData()">
          🔄 Aktualisieren
        </button>
        <button class="btn-export" onclick="exportCSV()">
          ⬇ CSV exportieren
        </button>
        <span class="count" id="countLabel"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Sitzung</th>
            <th>Datum</th>
            <th>Thema</th>
            <th>Uhrzeit</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="7" class="empty">Lade Daten…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const DB_URL =
        "https://gesfoerderung-checkin-default-rtdb.europe-west1.firebasedatabase.app";
      const ADMIN_PASSWORD = "seminar2026";
      let allData = [];

      function login() {
        const pw = document.getElementById("pwInput").value;
        if (pw === ADMIN_PASSWORD) {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
          loadData();
        } else {
          document.getElementById("loginError").style.display = "block";
        }
      }

      function loadData() {
        document.getElementById("countLabel").textContent = "Lädt…";
        fetch(`${DB_URL}/checkins.json`)
          .then((r) => r.json())
          .then((data) => {
            allData = [];
            if (data) {
              Object.entries(data).forEach(([key, val]) => {
                allData.push({ id: key, ...val });
              });
              allData.sort(
                (a, b) => new Date(a.timestamp) - new Date(b.timestamp)
              );
            }
            renderTable();
          })
          .catch((err) => {
            document.getElementById(
              "tableBody"
            ).innerHTML = `<tr><td colspan="7" class="empty" style="color:#e53e3e">Fehler: ${err.message}</td></tr>`;
          });
      }

      function renderTable() {
        const filter = document.getElementById("filterSession").value;
        const filtered = filter
          ? allData.filter((d) => d.sitzung === filter)
          : allData;
        document.getElementById(
          "countLabel"
        ).textContent = `${filtered.length} Einträge`;
        const tbody = document.getElementById("tableBody");
        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="empty">Noch keine Einträge.</td></tr>`;
          return;
        }
        tbody.innerHTML = filtered
          .map(
            (d, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${d.vorname}</td>
        <td>${d.nachname}</td>
        <td>${d.sitzung}</td>
        <td>${new Date(d.datum + "T12:00:00").toLocaleDateString("de-CH")}</td>
        <td>${d.thema}</td>
        <td>${new Date(d.timestamp).toLocaleTimeString("de-CH")}</td>
      </tr>`
          )
          .join("");
      }

      function exportCSV() {
        const filter = document.getElementById("filterSession").value;
        const data = filter
          ? allData.filter((d) => d.sitzung === filter)
          : allData;
        const header = "Vorname,Nachname,Sitzung,Datum,Thema,Uhrzeit\n";
        const rows = data
          .map(
            (d) =>
              `${d.vorname},${d.nachname},${d.sitzung},${new Date(
                d.datum + "T12:00:00"
              ).toLocaleDateString("de-CH")},"${d.thema}",${new Date(
                d.timestamp
              ).toLocaleTimeString("de-CH")}`
          )
          .join("\n");
        const blob = new Blob(["\uFEFF" + header + rows], {
          type: "text/csv;charset=utf-8;",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `anwesenheit_sitzung${filter || "_alle"}.csv`;
        a.click();
      }
    </script>
  </body>
</html>

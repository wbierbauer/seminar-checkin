<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seminar Check-in</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 36px 32px;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 1.4rem;
        color: #1a202c;
        margin-bottom: 6px;
      }
      .subtitle {
        color: #718096;
        font-size: 0.9rem;
        margin-bottom: 28px;
      }
      .session-badge {
        background: #ebf8ff;
        border: 1.5px solid #bee3f8;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 24px;
        color: #2b6cb0;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .session-badge span {
        display: block;
        font-weight: 400;
        font-size: 0.85rem;
        color: #4a90d9;
        margin-top: 2px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 18px;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: #4299e1;
      }
      button {
        width: 100%;
        padding: 14px;
        background: #3182ce;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2b6cb0;
      }
      button:disabled {
        background: #a0aec0;
        cursor: not-allowed;
      }
      .success {
        display: none;
        text-align: center;
        padding: 24px 0;
      }
      .success .checkmark {
        font-size: 3rem;
      }
      .success h2 {
        color: #2f855a;
        margin: 12px 0 6px;
      }
      .success p {
        color: #718096;
        font-size: 0.9rem;
      }
      .error-msg {
        color: #e53e3e;
        font-size: 0.85rem;
        margin-top: -12px;
        margin-bottom: 14px;
        display: none;
      }
      .no-session {
        text-align: center;
        padding: 20px 0;
      }
      .no-session .icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
      }
      .no-session h2 {
        color: #c05621;
        margin-bottom: 8px;
      }
      .no-session p {
        color: #718096;
        font-size: 0.9rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Kein Seminar heute -->
      <div id="noSessionView" class="no-session" style="display: none">
        <div class="icon">📅</div>
        <h2>Kein Seminar heute</h2>
        <p>
          Heute findet keine Sitzung des Seminars statt.<br />Der Check-in ist
          nur am jeweiligen Seminartag möglich.
        </p>
      </div>

      <!-- Check-in Formular -->
      <div id="formView" style="display: none">
        <h1>📋 Seminar Check-in</h1>
        <p class="subtitle">
          Gesundheitsförderung über die Lebensspanne – FS 2026
        </p>
        <div class="session-badge" id="sessionBadge">
          <!-- wird per JS befüllt -->
        </div>
        <label for="firstName">Vorname</label>
        <input
          type="text"
          id="firstName"
          placeholder="z.B. Anna"
          autocomplete="given-name"
        />
        <label for="lastName">Nachname</label>
        <input
          type="text"
          id="lastName"
          placeholder="z.B. Müller"
          autocomplete="family-name"
        />
        <p class="error-msg" id="errorMsg">
          Bitte Vor- und Nachname ausfüllen.
        </p>
        <button id="submitBtn" onclick="submitCheckin()">Einchecken ✓</button>
      </div>

      <!-- Erfolgsmeldung -->
      <div class="success" id="successView">
        <div class="checkmark">✅</div>
        <h2>Erfolgreich eingecheckt!</h2>
        <p id="successText"></p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDIhLKKCuoAH6zZhzXcGsmt08SpCL4_p3Y",
        authDomain: "gesfoerderung-checkin.firebaseapp.com",
        databaseURL:
          "https://gesfoerderung-checkin-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "gesfoerderung-checkin",
        messagingSenderId: "438018621779",
        appId: "1:438018621779:web:494337989638cdd393e1a6",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // Alle 12 Sitzungsdaten (Format: YYYY-MM-DD)
      const sessions = [
        { nr: "1", date: "2026-02-16", thema: "Vorstellung, Formalia" },
        {
          nr: "2",
          date: "2026-02-23",
          thema: "Einführung, Theorien der Verhaltensänderung",
        },
        { nr: "3", date: "2026-03-02", thema: "Tabakkonsum" },
        { nr: "4", date: "2026-03-09", thema: "Medikamenteneinnahme" },
        { nr: "5", date: "2026-03-16", thema: "Körperliche Aktivität" },
        { nr: "6", date: "2026-03-23", thema: "Alkohol" },
        { nr: "7", date: "2026-03-30", thema: "Ernährung" },
        { nr: "9", date: "2026-04-13", thema: "Stress" },
        { nr: "11", date: "2026-04-27", thema: "Social Media & Smartphone" },
        { nr: "12", date: "2026-05-04", thema: "Schlaf" },
        { nr: "13", date: "2026-05-11", thema: "Posterworkshop" },
        { nr: "14", date: "2026-05-18", thema: "Poster-Kongress" },
      ];

      // Heutiges Datum in Zürich (Europe/Zurich) als YYYY-MM-DD
      const todayStr = new Date().toLocaleDateString("sv-SE", {
        timeZone: "Europe/Zurich",
      });
      const todaySession = sessions.find((s) => s.date === todayStr);

      if (!todaySession) {
        document.getElementById("noSessionView").style.display = "block";
      } else {
        document.getElementById("formView").style.display = "block";
        const dateFormatted = new Date(
          todaySession.date + "T12:00:00"
        ).toLocaleDateString("de-CH", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        });
        document.getElementById(
          "sessionBadge"
        ).innerHTML = `Sitzung ${todaySession.nr} – ${dateFormatted}<span>${todaySession.thema}</span>`;
      }

      window.submitCheckin = function () {
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const errorMsg = document.getElementById("errorMsg");

        if (!firstName || !lastName) {
          errorMsg.style.display = "block";
          return;
        }
        errorMsg.style.display = "none";

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Wird gespeichert…";

        const entry = {
          vorname: firstName,
          nachname: lastName,
          sitzung: todaySession.nr,
          datum: todaySession.date,
          thema: todaySession.thema,
          timestamp: new Date().toISOString(),
        };

        push(ref(db, "checkins"), entry)
          .then(() => {
            document.getElementById("formView").style.display = "none";
            document.getElementById("successView").style.display = "block";
            document.getElementById(
              "successText"
            ).textContent = `${firstName} ${lastName} – Sitzung ${todaySession.nr} (${todaySession.thema})`;
          })
          .catch((err) => {
            btn.disabled = false;
            btn.textContent = "Einchecken ✓";
            alert("Fehler: " + err.message);
          });
      };
    </script>
  </body>
</html>
